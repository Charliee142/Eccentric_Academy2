{% extends 'base.html' %}

{% block title %}Password Changed – Eccentric Academy{% endblock %}

{% block content %}
<div class="ea-auth-page">
    <div class="ea-hero-grid"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">

                <div class="ea-auth-card text-center">
                    <div style="font-size:4rem;margin-bottom:1rem;">🎉</div>
                    <h4 class="text-white mb-3">Password Changed!</h4>

                    <div class="p-3 mb-4" style="background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.2);border-radius:10px;">
                        <p class="text-white small mb-0">
                            <i class="bi bi-check-circle-fill text-accent me-2"></i>
                            Your password has been successfully updated. You can now sign in with your new password.
                        </p>
                    </div>

                    <a href="{% url 'account_login' %}" class="btn btn-ea-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In Now
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
