{% extends 'base.html' %}

{% block title %}Sign Out – Eccentric Academy{% endblock %}

{% block content %}
<div class="ea-auth-page">
    <div class="ea-hero-grid"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">

                <div class="text-center mb-4">
                    <span style="font-size:2rem;color:var(--ea-accent);filter:drop-shadow(0 0 8px var(--ea-accent));">
                        <i class="bi bi-shield-lock-fill"></i>
                    </span>
                </div>

                <div class="ea-auth-card text-center">
                    <div style="font-size:3.5rem;margin-bottom:1rem;">👋</div>
                    <h4 class="text-white mb-2">Sign Out?</h4>
                    <p class="text-white small mb-4">
                        You're about to sign out of Eccentric Academy.<br>
                        Your progress and enrollments are safely saved.
                    </p>

                    <form method="POST" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-ea-primary w-100 mb-3">
                            <i class="bi bi-box-arrow-right me-2"></i>Yes, Sign Me Out
                        </button>
                    </form>

                    <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-accent w-100">
                        <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
